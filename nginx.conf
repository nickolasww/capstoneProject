server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    location /api/v1/ {
        add_header 'Access-Control-Allow-Origin' 'https://dev.bukitaurumnsejahtera.co.id';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        
        if ($request_method = OPTIONS) {
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://bas-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache busting for JS/CSS
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache HTML but check for updates
    location ~* \.html$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health check for Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

     # SPA routing: Route all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}