stages:
  - docker
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_BUILDKIT: "0"
  COMPOSE_DOCKER_CLI_BUILD: "0"

docker-build-prod:
  image: docker:24
  stage: docker
  only:
    - main
  tags:
    - docker
  script:
    - docker info
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker build --build-arg API_URL=$PROD_API_URL -t $CI_REGISTRY_IMAGE:$IMAGE_TAG -t $CI_REGISTRY_IMAGE:prod .
    - docker push $CI_REGISTRY_IMAGE:prod
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG

docker-build-dev:
  image: docker:24
  stage: docker
  only:
    - dev
  tags:
    - docker
  script:
    - docker info
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker build --build-arg API_URL=$DEV_API_URL -t $CI_REGISTRY_IMAGE:$IMAGE_TAG -t $CI_REGISTRY_IMAGE:dev .
    - docker push $CI_REGISTRY_IMAGE:dev
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG

deploy-prod:
  stage: deploy
  tags:
    - docker
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -p $SSH_PORT $SSH_IP >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Deploying React Frontend..."
    - ssh $SSH_USER@$SSH_IP -p $SSH_PORT "
        docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD &&
        cd $FRONTEND_SERVER_DIR &&
        docker compose -f docker-compose.prod.yaml pull  bas-frontend &&
        docker compose -f docker-compose.prod.yaml up -d bas-frontend &&
        sleep 5 &&
        docker compose -f docker-compose.prod.yaml ps &&
        docker image prune -f --filter \"dangling=true\"
      "
    - echo "✅ Frontend deployment complete!"

deploy-dev:
  stage: deploy
  tags:
    - docker
  only:
    - dev
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -p $SSH_PORT $SSH_IP >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Deploying React Frontend..."
    - ssh $SSH_USER@$SSH_IP -p $SSH_PORT "
        docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD &&
        cd $FRONTEND_SERVER_DIR &&
        docker compose pull bas-frontend &&
        docker compose up -d bas-frontend &&
        sleep 5 &&
        docker compose ps &&
        docker image prune -f --filter \"dangling=true\"
      "
    - echo "✅ Frontend deployment complete!"