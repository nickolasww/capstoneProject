stages:
  - docker
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# 1. Build & push Docker image
docker-build:
  image: docker:24
  stage: docker
  tags:
    - docker
  script:
    - docker info
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG

# 2. Deploy to server
deploy:
  stage: deploy
  tags:
    - docker
  only:
    - main
    - dev
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -p $SSH_PORT $SSH_IP >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Deploying React Frontend..."
    - ssh $SSH_USER@$SSH_IP -p $SSH_PORT "
        docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD &&
        cd $FRONTEND_SERVER_DIR &&
        docker compose pull website-frontend &&
        docker compose up -d website-frontend &&
        sleep 5 &&
        docker compose ps &&
        docker image prune -f --filter \"dangling=true\"
      "
    - echo "✅ Frontend deployment complete!"