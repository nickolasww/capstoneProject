version: '3.9'
name: bas-frontend

services:
  bas-frontend:
    env_file:
      - .env
    image: ${FRONTEND_IMAGE_NAME}:${FRONTEND_IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile
    args:
      API_URL: ${VITE_API_BASE_URL}
    container_name: bas-frontend
    ports:
     - ${PORT}:80
    expose: 
      - "80"
    restart: always
      - private-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  private-net:
    external: true